services:

  api:
    build: ./api
    container_name: api
    ports:
      - "8080:8080"
    env_file:
      - ./configs/pro.env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16

    env_file:
      - ./configs/prod.env

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7


volumes:
  postgres_data: